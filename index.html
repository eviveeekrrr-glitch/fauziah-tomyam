
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauziah Tomyam - QR Ordering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .notification-toast {
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 20px); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Notification Container -->
    <div id="notification-container" class="fixed top-0 left-1/2 -translate-x-1/2 z-[100] w-full max-w-xs pointer-events-none"></div>

    <!-- MAIN APP CONTAINER -->
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative">
        <!-- Views will be injected here -->
    </div>

    <script>
        // --- DATA ---
        const menuData = {
            "Masakan": [
                { id: 'm1', name: 'Masak Merah', variants: ['Ayam', 'Daging', 'Perut', 'Seafood', 'Udang', 'Sotong'], prices: [7, 7, 8, 8, 8, 8] },
                { id: 'm2', name: 'Masak Pedas', variants: ['Ayam', 'Daging', 'Perut', 'Seafood', 'Udang', 'Sotong'], prices: [7, 7, 8, 8, 8, 8] },
                { id: 'm3', name: 'Masak Paprik', variants: ['Ayam', 'Daging', 'Perut', 'Seafood', 'Udang', 'Sotong'], prices: [7, 7, 8, 8, 8, 8] },
                { id: 'm4', name: 'Black Pepper', variants: ['Ayam', 'Daging', 'Perut', 'Seafood', 'Udang', 'Sotong'], prices: [7, 7, 8, 8, 8, 8] }
            ],
            "Nasi Goreng": [
                { id: 'ng1', name: 'Fauziah Special', price: 10.00 },
                { id: 'ng2', name: 'USA', price: 9.00 },
                { id: 'ng3', name: 'Thailand', price: 9.00 },
                { id: 'ng4', name: 'Hatan Special', price: 9.00 },
                { id: 'ng5', name: 'Petai', price: 10.00 }
            ],
            "Western": [
                { id: 'w1', name: 'Chicken Chop', price: 14.00 },
                { id: 'w2', name: 'Lamb Chop', price: 18.00 },
                { id: 'w3', name: 'Beef Steak', price: 18.00 },
                { id: 'w4', name: 'Fish & Chip', price: 11.00 }
            ],
            "Minuman": [
                { id: 'd1', name: 'Teh O', variants: ['Panas', 'Sejuk'], prices: [1.50, 2.00] },
                { id: 'd2', name: 'Teh Halia', variants: ['Panas', 'Sejuk'], prices: [2.50, 3.00] },
                { id: 'd3', name: 'Milo', variants: ['Panas', 'Sejuk'], prices: [2.50, 3.00] },
                { id: 'd4', name: 'Nescafe', variants: ['Panas', 'Sejuk'], prices: [2.00, 2.50] }
            ]
        };

        let cart = [];
        let orders = [];
        let currentView = 'landing';
        let orderMode = null; // 'Dine-In' or 'Takeaway'
        let activeCategory = 'Masakan';

        // --- CORE FUNCTIONS ---

        function showNotification(message, type = 'info') {
            const container = document.getElementById('notification-container');
            const toast = document.createElement('div');
            toast.className = `notification-toast mb-2 p-4 rounded-xl shadow-lg text-white font-bold text-sm flex items-center gap-3 ${type === 'ready' ? 'bg-green-600' : 'bg-gray-800'}`;
            toast.innerHTML = `<i class="fas ${type === 'ready' ? 'fa-bell' : 'fa-info-circle'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function addToCart(itemId, variantIndex = null) {
            let item;
            for (const cat in menuData) {
                const found = menuData[cat].find(i => i.id === itemId);
                if (found) { item = found; break; }
            }

            const cartItem = {
                id: Date.now(),
                name: item.name,
                variant: variantIndex !== null ? item.variants[variantIndex] : null,
                price: variantIndex !== null ? item.prices[variantIndex] : item.price
            };

            cart.push(cartItem);
            showNotification(`Added ${cartItem.name} to cart`);
            renderView();
        }

        function placeOrder() {
            if (cart.length === 0) return;
            const newOrder = {
                id: Math.floor(1000 + Math.random() * 9000),
                type: orderMode,
                items: [...cart],
                status: 'pending', // pending, ready
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                total: cart.reduce((sum, item) => sum + item.price, 0)
            };
            orders.unshift(newOrder);
            cart = [];
            showNotification("Order placed! Sending to kitchen...");
            currentView = 'landing';
            renderView();
        }

        function updateOrderStatus(id, status) {
            const order = orders.find(o => o.id === id);
            if (order) {
                order.status = status;
                if (status === 'ready') showNotification(`Order #${id} is READY!`, 'ready');
                renderView();
            }
        }

        function removeOrder(id) {
            orders = orders.filter(o => o.id !== id);
            renderView();
        }

        // --- VIEWS ---

        function renderView() {
            const container = document.getElementById('app');
            
            if (currentView === 'landing') {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-8 text-center bg-gradient-to-b from-red-50 to-white">
                        <div class="w-24 h-24 bg-red-600 rounded-3xl flex items-center justify-center mb-6 shadow-2xl rotate-3">
                            <i class="fas fa-utensils text-4xl text-white"></i>
                        </div>
                        <h1 class="text-3xl font-black text-red-800 tracking-tight">FAUZIAH TOMYAM</h1>
                        <p class="text-gray-500 font-medium mb-12">Authentic Thai & Western Cuisine</p>
                        
                        <div class="w-full space-y-4">
                            <button onclick="orderMode='Dine-In'; currentView='menu'; renderView()" class="w-full p-6 bg-white border-2 border-red-100 rounded-2xl flex items-center justify-between hover:border-red-500 transition-all shadow-sm group">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center text-red-600 group-hover:bg-red-600 group-hover:text-white transition-colors">
                                        <i class="fas fa-chair"></i>
                                    </div>
                                    <span class="text-xl font-bold">Dine-In</span>
                                </div>
                                <i class="fas fa-chevron-right text-gray-300"></i>
                            </button>

                            <button onclick="orderMode='Takeaway'; currentView='menu'; renderView()" class="w-full p-6 bg-white border-2 border-red-100 rounded-2xl flex items-center justify-between hover:border-red-500 transition-all shadow-sm group">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center text-red-600 group-hover:bg-red-600 group-hover:text-white transition-colors">
                                        <i class="fas fa-bag-shopping"></i>
                                    </div>
                                    <span class="text-xl font-bold">Takeaway</span>
                                </div>
                                <i class="fas fa-chevron-right text-gray-300"></i>
                            </button>
                        </div>

                        <button onclick="currentView='kitchen'; renderView()" class="mt-20 text-xs text-gray-400 font-bold tracking-widest uppercase hover:text-red-500">
                            <i class="fas fa-desktop mr-1"></i> Kitchen Terminal
                        </button>
                    </div>
                `;
            } 
            
            else if (currentView === 'menu') {
                let menuHtml = '';
                menuData[activeCategory].forEach(item => {
                    menuHtml += `
                        <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                            <h3 class="font-bold text-gray-800">${item.name}</h3>
                            ${item.variants ? `
                                <div class="grid grid-cols-2 gap-2 mt-3">
                                    ${item.variants.map((v, idx) => `
                                        <button onclick="addToCart('${item.id}', ${idx})" class="text-[10px] bg-red-50 text-red-700 p-2 rounded-lg border border-red-100 font-bold hover:bg-red-100 flex justify-between">
                                            <span>${v}</span>
                                            <span>RM${item.prices[idx].toFixed(2)}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            ` : `
                                <div class="flex items-center justify-between mt-3">
                                    <span class="text-red-600 font-black">RM ${item.price.toFixed(2)}</span>
                                    <button onclick="addToCart('${item.id}')" class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            `}
                        </div>
                    `;
                });

                container.innerHTML = `
                    <div class="flex flex-col h-screen overflow-hidden">
                        <!-- Header -->
                        <div class="bg-red-700 text-white px-4 py-6">
                            <div class="flex items-center justify-between">
                                <button onclick="currentView='landing'; renderView()"><i class="fas fa-arrow-left"></i></button>
                                <span class="font-black tracking-tight">FAUZIAH TOMYAM</span>
                                <span class="text-xs font-bold px-2 py-1 bg-red-800 rounded-lg">${orderMode}</span>
                            </div>
                        </div>

                        <!-- Categories -->
                        <div class="flex overflow-x-auto no-scrollbar bg-white border-b px-2">
                            ${Object.keys(menuData).map(cat => `
                                <button onclick="activeCategory='${cat}'; renderView()" class="px-4 py-4 whitespace-nowrap text-sm font-bold ${activeCategory === cat ? 'text-red-600 border-b-2 border-red-600' : 'text-gray-400'}">
                                    ${cat.toUpperCase()}
                                </button>
                            `).join('')}
                        </div>

                        <!-- Menu Items -->
                        <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-32">
                            <div class="menu-grid">
                                ${menuHtml}
                            </div>
                        </div>

                        <!-- Cart Bar -->
                        ${cart.length > 0 ? `
                            <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t flex items-center justify-between shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
                                <div>
                                    <p class="text-[10px] text-gray-400 font-bold uppercase">Items: ${cart.length}</p>
                                    <p class="text-xl font-black text-red-600">RM ${cart.reduce((s, i) => s + i.price, 0).toFixed(2)}</p>
                                </div>
                                <button onclick="placeOrder()" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-sm shadow-lg shadow-green-100 active:scale-95 transition-transform">
                                    CONFIRM ORDER
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            else if (currentView === 'kitchen') {
                container.innerHTML = `
                    <div class="min-h-screen bg-gray-900 text-white p-6">
                        <div class="flex items-center justify-between mb-8">
                            <h2 class="text-xl font-black tracking-tighter uppercase"><i class="fas fa-fire text-orange-500 mr-2"></i> Kitchen Terminal</h2>
                            <button onclick="currentView='landing'; renderView()" class="bg-gray-800 px-3 py-1 rounded text-xs font-bold">EXIT</button>
                        </div>

                        <div class="space-y-4">
                            ${orders.length === 0 ? `
                                <div class="text-center py-20 text-gray-600">
                                    <i class="fas fa-clock text-4xl mb-4 opacity-20"></i>
                                    <p>Waiting for orders...</p>
                                </div>
                            ` : orders.map(order => `
                                <div class="bg-gray-800 rounded-2xl border-l-4 ${order.status === 'ready' ? 'border-green-500 bg-green-950/20' : 'border-orange-500'} overflow-hidden shadow-xl">
                                    <div class="p-4 flex justify-between items-start border-b border-white/5">
                                        <div>
                                            <span class="text-[10px] font-bold text-gray-500">ID: #${order.id}</span>
                                            <p class="text-lg font-bold">${order.time}</p>
                                        </div>
                                        <span class="text-[10px] px-2 py-1 rounded bg-gray-700 font-black">${order.type}</span>
                                    </div>
                                    <div class="p-4 space-y-2">
                                        ${order.items.map(item => `
                                            <div class="flex justify-between text-sm">
                                                <span>• ${item.name} ${item.variant ? `<span class="text-orange-400 font-bold">[${item.variant}]</span>` : ''}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="p-4 bg-black/20 flex gap-2">
                                        ${order.status === 'pending' ? `
                                            <button onclick="updateOrderStatus(${order.id}, 'ready')" class="flex-1 bg-green-600 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">
                                                Notify Student
                                            </button>
                                        ` : `
                                            <button onclick="removeOrder(${order.id})" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-xs uppercase tracking-widest">
                                                Dismiss Order
                                            </button>
                                        `}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        // Initialize
        renderView();
    </script>
</body>
</html>

```
