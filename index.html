
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauziah Tomyam - Live System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #dc2626; border-bottom: 3px solid #dc2626; }
        .order-card { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative">
        <div class="flex items-center justify-center h-screen">
            <div class="text-center">
                <i class="fas fa-circle-notch fa-spin text-3xl text-red-600 mb-4"></i>
                <p class="text-gray-500 font-bold">Connecting to Kitchen...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuration from environment
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fauziah-tomyam-001';

        // State
        let user = null;
        let currentView = 'landing';
        let orderType = '';
        let activeTab = 'Masakan';
        let cart = [];
        let liveOrders = [];

        // Menu Data
        const menuData = {
            "Masakan": [
                { name: "Merah", types: ["Ayam", "Daging", "Perut", "Seafood", "Udang", "Sotong"], prices: [7, 7, 8, 8, 8, 8] },
                { name: "Pedas", types: ["Ayam", "Daging", "Perut", "Seafood", "Udang", "Sotong"], prices: [7, 7, 8, 8, 8, 8] },
                { name: "Paprik", types: ["Ayam", "Daging", "Perut", "Seafood", "Udang", "Sotong"], prices: [7, 7, 8, 8, 8, 8] },
                { name: "Black Papper", types: ["Ayam", "Daging", "Perut", "Seafood", "Udang", "Sotong"], prices: [7, 7, 8, 8, 8, 8] }
            ],
            "Nasi Goreng": [
                { name: "Fauziah", price: 10.0 }, { name: "Special", price: 9.0 },
                { name: "U.S.A", price: 9.0 }, { name: "Thailand", price: 9.0 }
            ],
            "Minuman": [
                { name: "Teh O", variants: ["Panas", "Sejuk"], prices: [1.5, 2.0] },
                { name: "Teh", variants: ["Panas", "Sejuk"], prices: [2.0, 2.5] },
                { name: "Milo", variants: ["Panas", "Sejuk"], prices: [2.5, 3.0] }
            ],
            "Western": [
                { name: "Chicken Chop", price: 14.0 }, { name: "Lamb Chop", price: 18.0 }
            ]
        };

        // --- AUTH & INITIALIZATION ---
        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) startListening();
                });
            } catch (err) { console.error("Auth failed", err); }
        }

        function startListening() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            onSnapshot(q, (snapshot) => {
                liveOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // Sort by timestamp (newest first)
                liveOrders.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                render();
            }, (err) => console.error("Listen error", err));
        }

        // --- ACTIONS ---
        window.changeView = (view) => { currentView = view; render(); };
        window.setOrderType = (type) => { orderType = type; currentView = 'menu'; render(); };
        window.setActiveTab = (tab) => { activeTab = tab; render(); };
        
        window.addToCart = (name, price) => {
            cart.push({ name, price });
            render();
        };

        window.checkout = async () => {
            if (!user || cart.length === 0) return;
            const orderObj = {
                type: orderType,
                items: cart,
                status: 'Pending',
                createdAt: serverTimestamp(),
                total: cart.reduce((s, i) => s + i.price, 0)
            };
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), orderObj);
                cart = [];
                currentView = 'landing';
                alert("Order Sent to Kitchen!");
                render();
            } catch (e) { alert("Error sending order"); }
        };

        window.markReady = async (id) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
            await updateDoc(docRef, { status: 'Ready' });
        };

        window.removeOrder = async (id) => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
            await deleteDoc(docRef);
        };

        // --- UI RENDERING ---
        function render() {
            const app = document.getElementById('app');
            
            if (currentView === 'landing') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-screen p-8 text-center bg-red-600 text-white">
                        <div class="mb-6 w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-xl">
                            <i class="fas fa-utensils text-red-600 text-3xl"></i>
                        </div>
                        <h1 class="text-3xl font-black tracking-tighter mb-2">FAUZIAH TOMYAM</h1>
                        <p class="opacity-80 text-sm mb-12">ORDER FROM YOUR TABLE</p>
                        <div class="w-full space-y-4">
                            <button onclick="setOrderType('Dine-In')" class="w-full py-4 bg-white text-red-600 rounded-2xl font-black shadow-xl active:scale-95 transition-transform">DINE-IN</button>
                            <button onclick="setOrderType('Takeaway')" class="w-full py-4 border-2 border-white rounded-2xl font-black active:scale-95 transition-transform">TAKE AWAY</button>
                        </div>
                        <button onclick="changeView('kitchen')" class="mt-20 text-[10px] font-bold opacity-40 uppercase tracking-widest border-b border-white/30">Switch to Kitchen View</button>
                    </div>
                `;
            } 
            
            else if (currentView === 'menu') {
                app.innerHTML = `
                    <div class="flex flex-col h-screen">
                        <div class="p-4 bg-white border-b sticky top-0 z-10">
                            <div class="flex justify-between items-center mb-4">
                                <button onclick="changeView('landing')"><i class="fas fa-arrow-left text-red-600"></i></button>
                                <span class="font-bold text-gray-800">${orderType} Menu</span>
                                <div class="w-4"></div>
                            </div>
                            <div class="flex overflow-x-auto no-scrollbar space-x-6 text-xs font-black uppercase tracking-tighter">
                                ${Object.keys(menuData).map(cat => `
                                    <button onclick="setActiveTab('${cat}')" class="pb-2 whitespace-nowrap ${activeTab === cat ? 'active-tab' : 'text-gray-300'}">${cat}</button>
                                `).join('')}
                            </div>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 space-y-3 pb-32">
                            ${menuData[activeTab].map(item => `
                                <div class="bg-white p-4 rounded-2xl border shadow-sm border-gray-100">
                                    <h3 class="font-bold text-gray-800">${item.name}</h3>
                                    <div class="flex flex-wrap gap-2 mt-3">
                                        ${item.price ? `
                                            <button onclick="addToCart('${item.name}', ${item.price})" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-black border border-red-100">+ RM${item.price.toFixed(2)}</button>
                                        ` : (item.types || item.variants).map((type, i) => `
                                            <button onclick="addToCart('${item.name} (${type})', ${item.prices[i]})" class="bg-gray-50 text-gray-600 px-3 py-2 rounded-xl text-[10px] font-bold border">+ ${type} RM${item.prices[i].toFixed(2)}</button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        ${cart.length > 0 ? `
                            <div class="fixed bottom-0 max-w-md w-full bg-white p-4 border-t shadow-2xl flex justify-between items-center animate-bounce">
                                <div><p class="text-xl font-black text-red-600">RM ${cart.reduce((s, i) => s + i.price, 0).toFixed(2)}</p></div>
                                <button onclick="checkout()" class="bg-red-600 text-white px-10 py-3 rounded-2xl font-black shadow-lg">ORDER NOW</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            else if (currentView === 'kitchen') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gray-900 text-white p-6">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black text-red-500 tracking-tighter">LIVE ORDERS</h2>
                            <button onclick="changeView('landing')" class="text-[10px] bg-gray-800 px-4 py-2 rounded-full font-bold">CLOSE</button>
                        </div>
                        <div class="space-y-4">
                            ${liveOrders.length === 0 ? `<p class="text-center text-gray-600 py-20">No orders yet...</p>` : ''}
                            ${liveOrders.map(o => `
                                <div class="order-card bg-gray-800 p-5 rounded-3xl border-l-8 ${o.status === 'Ready' ? 'border-green-500' : 'border-red-600 shadow-[0_0_20px_rgba(220,38,38,0.2)]'}">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${o.type}</span>
                                            <p class="text-xs text-gray-400">Order ID: ...${o.id.slice(-4)}</p>
                                        </div>
                                        <span class="px-3 py-1 rounded-full text-[10px] font-black ${o.status === 'Ready' ? 'bg-green-600' : 'bg-red-600'}">${o.status}</span>
                                    </div>
                                    <div class="space-y-2 mb-6">
                                        ${o.items.map(i => `<div class="flex justify-between text-sm font-medium"><span>• ${i.name}</span><span class="text-gray-500 italic">RM${i.price}</span></div>`).join('')}
                                    </div>
                                    <div class="pt-4 border-t border-white/5">
                                        ${o.status === 'Pending' ? `
                                            <button onclick="markReady('${o.id}')" class="w-full py-4 bg-green-600 rounded-2xl font-black text-xs uppercase tracking-widest">Mark as Ready</button>
                                        ` : `
                                            <button onclick="removeOrder('${o.id}')" class="w-full py-4 bg-blue-600 rounded-2xl font-black text-xs uppercase tracking-widest">Order Completed</button>
                                        `}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>

```
