
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fauziah Tomyam - Official Order</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
      import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      window.FirebaseSDK = { initializeApp, getFirestore, collection, doc, addDoc, onSnapshot, updateDoc, query, getAuth, signInAnonymously, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fef2f2; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MENU_DATA = {
            minuman: [
                { name: 'Teh O', hot: 1.50, cold: 2.00 }, { name: 'Teh', hot: 2.00, cold: 2.50 },
                { name: 'Teh Halia', hot: 2.50, cold: 3.00 }, { name: 'Kopi O', hot: 1.50, cold: 2.00 },
                { name: 'Kopi', hot: 2.00, cold: 2.50 }, { name: 'Milo O', hot: 2.00, cold: 2.50 },
                { name: 'Milo', hot: 2.50, cold: 3.00 }, { name: 'Nescafe O', hot: 2.00, cold: 2.50 },
                { name: 'Nescafe', hot: 2.50, cold: 3.00 }, { name: 'Neslo', hot: 3.00, cold: 3.50 },
                { name: 'Horlick O', hot: 2.00, cold: 2.50 }, { name: 'Horlick', hot: 2.50, cold: 3.00 },
                { name: 'Sirap', hot: 1.50, cold: 2.00 }, { name: 'Sirap Bandung', hot: 2.00, cold: 2.50 },
                { name: 'Sirap Limau', hot: 2.00, cold: 2.50 }, { name: 'Barli', hot: 2.00, cold: 2.00 },
                { name: 'Laicikang', hot: 4.00, cold: 4.00 }, { name: 'Kopi Jantan', hot: 2.50, cold: 3.00 },
                { name: 'Radix', hot: 2.50, cold: 3.00 }, { name: 'Extra Joss', cold: 2.50 },
                { name: 'Teh Hijau', hot: 2.50, cold: 3.00 }, { name: 'Sirap Hijau', cold: 2.00 }
            ],
            masakan: {
                types: ['Ayam', 'Daging', 'Perut', 'Seafood', 'Udang', 'Sotong'],
                prices: { ayam: 7.0, daging: 7.0, perut: 8.0, seafood: 8.0, udang: 8.0, sotong: 8.0 },
                styles: ['Merah', 'Pedas', 'Paprik', 'Black Papper', 'Halia', 'Kicap', 'Goreng', 'Kerabu']
            },
            nasiGoreng: [
                { name: 'Fauziah', price: 10.00 }, { name: 'Special', price: 9.00 },
                { name: 'U.S.A', price: 9.00 }, { name: 'Thailand', price: 9.00 },
                { name: 'Hatan Special', price: 9.00 }, { name: 'Goreng Petai', price: 10.00 }
            ],
            western: [
                { name: 'Chicken Chop', price: 14.00 }, { name: 'Lamb Chop', price: 18.00 },
                { name: 'Beef Steak', price: 18.00 }, { name: 'Fish & Chip', price: 11.00 },
                { name: 'Chicken Wing', price: 7.00 }, { name: 'French Fries', price: 5.00 },
                { name: 'Mashroom Soup', price: 5.00 }
            ],
            istimewa: [
                { name: 'Somtam Thai', price: 6.00 }, { name: 'Somtam Plam', price: 6.00 },
                { name: 'Somtam Buahr', price: 7.00 }, { name: 'Kerabu Suhun', price: 6.00 },
                { name: 'Kerabu Maggi', price: 6.00 }
            ],
            buah: [
                { name: 'Limau', hot: 1.50, cold: 2.00 }, { name: 'Orange Sunquick', hot: 2.00, cold: 2.50 },
                { name: 'Fresh Orange', price: 3.50 }, { name: 'Apple', price: 3.50 },
                { name: 'Nanas', price: 3.50 }, { name: 'Tembikai', price: 3.50 },
                { name: 'Carrot', price: 3.50 }, { name: 'Laici', price: 3.50 },
                { name: 'Tembikai Laici', price: 5.00 }, { name: 'Longan', price: 3.50 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [diningType, setDiningType] = useState(null);
            const [cart, setCart] = useState([]);
            const [orders, setOrders] = useState([]);
            const [user, setUser] = useState(null);
            const [activeCategory, setActiveCategory] = useState('Minuman');

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseSDK) {
                        clearInterval(checkFirebase);
                        initFirebase();
                    }
                }, 500);
            }, []);

            const initFirebase = async () => {
                const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const config = JSON.parse(window.__firebase_config || '{}');
                const app = initializeApp(config);
                const auth = getAuth(app);
                const db = getFirestore(app);
                const aid = window.__app_id || 'fauziah-tomyam-v1';

                signInAnonymously(auth);
                onAuthStateChanged(auth, setUser);

                onSnapshot(collection(db, 'artifacts', aid, 'public', 'data', 'orders'), (s) => {
                    setOrders(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.createdAt - a.createdAt));
                });
            };

            const sendOrder = async () => {
                const { getFirestore, collection, addDoc } = window.FirebaseSDK;
                const db = getFirestore();
                const aid = window.__app_id || 'fauziah-tomyam-v1';
                
                await addDoc(collection(db, 'artifacts', aid, 'public', 'data', 'orders'), {
                    items: cart,
                    diningType,
                    status: 'pending',
                    createdAt: Date.now(),
                    total: cart.reduce((s,i) => s + (i.price * i.qty), 0),
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                setCart([]); setDiningType(null); setView('landing');
                alert("Order dihantar!");
            };

            const updateOrder = async (id, status) => {
                const { getFirestore, doc, updateDoc } = window.FirebaseSDK;
                await updateDoc(doc(getFirestore(), 'artifacts', window.__app_id || 'fauziah-tomyam-v1', 'public', 'data', 'orders', id), { status });
            };

            if (view === 'landing') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-red-700 text-white">
                        <h1 className="text-4xl font-black italic mb-2 tracking-tighter">FAUZIAH TOMYAM</h1>
                        <p className="mb-12 opacity-80 text-[10px] font-bold tracking-[0.2em] uppercase">Thai & Western Food</p>
                        <div className="grid grid-cols-1 gap-4 w-full max-w-xs">
                            <button onClick={() => setView('student')} className="bg-white text-red-700 p-6 rounded-3xl shadow-2xl font-black text-xl">ORDER NOW</button>
                            <button onClick={() => setView('kitchen')} className="bg-slate-900 text-white p-6 rounded-3xl shadow-2xl font-black text-xl uppercase">Kitchen</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-44">
                    <header className="bg-red-700 p-4 text-white flex justify-between items-center sticky top-0 z-50">
                        <button onClick={() => setView('landing')} className="font-bold text-xs uppercase tracking-widest">Back</button>
                        <h2 className="font-black uppercase tracking-tighter text-sm">Fauziah Tomyam</h2>
                        <div className="w-8"></div>
                    </header>

                    {view === 'student' ? (
                        <div>
                            {!diningType ? (
                                <div className="p-8 flex flex-col justify-center min-h-[80vh] gap-6">
                                    <button onClick={() => setDiningType('Makan Sini')} className="bg-red-700 text-white py-12 rounded-3xl text-3xl font-black shadow-xl">MAKAN SINI</button>
                                    <button onClick={() => setDiningType('Bungkus')} className="border-4 border-red-700 text-red-700 py-12 rounded-3xl text-3xl font-black">BUNGKUS</button>
                                </div>
                            ) : (
                                <div className="p-4">
                                    <div className="flex gap-4 overflow-x-auto mb-6 border-b pb-2 scrollbar-hide text-[10px] font-black uppercase sticky top-14 bg-white z-40">
                                        {['Minuman', 'Buah', 'Masakan', 'Nasi Goreng', 'Istimewa', 'Western'].map(c => (
                                            <button key={c} onClick={() => setActiveCategory(c)} className={activeCategory === c ? 'border-b-4 border-red-700 text-red-700 pb-2' : 'text-slate-400 pb-2'}>{c}</button>
                                        ))}
                                    </div>
                                    <div className="space-y-3">
                                        {activeCategory === 'Minuman' && MENU_DATA.minuman.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 border rounded-2xl bg-white shadow-sm">
                                                <span className="font-bold text-sm">{item.name}</span>
                                                <div className="flex gap-2">
                                                    {item.hot && <button onClick={() => setCart([...cart, {name: item.name+' (P)', price: item.hot, qty: 1}])} className="bg-orange-100 text-orange-700 px-3 py-2 rounded-xl text-[10px] font-black">P: {item.hot.toFixed(2)}</button>}
                                                    {item.cold && <button onClick={() => setCart([...cart, {name: item.name+' (S)', price: item.cold, qty: 1}])} className="bg-blue-100 text-blue-700 px-3 py-2 rounded-xl text-[10px] font-black">S: {item.cold.toFixed(2)}</button>}
                                                </div>
                                            </div>
                                        ))}
                                        {activeCategory === 'Masakan' && MENU_DATA.masakan.styles.map((style, i) => (
                                            <div key={i} className="p-4 border rounded-3xl bg-slate-50">
                                                <h4 className="font-black text-red-700 mb-3 text-xs uppercase tracking-widest border-b pb-1 inline-block">{style}</h4>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {MENU_DATA.masakan.types.map((type, j) => (
                                                        <button key={j} onClick={() => setCart([...cart, {name: style + ' ' + type, price: MENU_DATA.masakan.prices[type.toLowerCase()], qty: 1}])} className="bg-white border p-3 rounded-xl text-[10px] font-bold flex justify-between items-center">
                                                            <span>{type}</span>
                                                            <span className="text-red-700">RM{MENU_DATA.masakan.prices[type.toLowerCase()].toFixed(2)}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        {activeCategory === 'Nasi Goreng' && MENU_DATA.nasiGoreng.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-4 border rounded-2xl bg-white shadow-sm">
                                                <span className="font-bold text-sm">N.G {item.name}</span>
                                                <button onClick={() => setCart([...cart, {name: 'N.G '+item.name, price: item.price, qty: 1}])} className="bg-red-700 text-white px-4 py-2 rounded-xl text-[11px] font-black">RM{item.price.toFixed(2)}</button>
                                            </div>
                                        ))}
                                        {activeCategory === 'Western' && MENU_DATA.western.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-4 border rounded-2xl bg-white shadow-sm">
                                                <span className="font-bold text-sm">{item.name}</span>
                                                <button onClick={() => setCart([...cart, {name: item.name, price: item.price, qty: 1}])} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[11px] font-black">RM{item.price.toFixed(2)}</button>
                                            </div>
                                        ))}
                                        {activeCategory === 'Istimewa' && MENU_DATA.istimewa.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-4 border rounded-2xl bg-white shadow-sm">
                                                <span className="font-bold text-sm">{item.name}</span>
                                                <button onClick={() => setCart([...cart, {name: item.name, price: item.price, qty: 1}])} className="bg-red-700 text-white px-4 py-2 rounded-xl text-[11px] font-black">RM{item.price.toFixed(2)}</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {cart.length > 0 && (
                                <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t-2 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50">
                                    <div className="flex justify-between mb-2 px-1">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Selected ({cart.length})</span>
                                        <span className="text-sm font-black text-red-700">RM{cart.reduce((s,i) => s + (i.price * i.qty), 0).toFixed(2)}</span>
                                    </div>
                                    <button onClick={sendOrder} className="w-full bg-red-700 text-white py-5 rounded-2xl font-black text-center uppercase tracking-widest shadow-xl">CONFIRM ORDER</button>
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="p-4 space-y-4">
                            <h3 className="font-black text-slate-900 uppercase tracking-tighter border-b pb-2">Orders Dashboard</h3>
                            {orders.filter(o => o.status !== 'done').map(o => (
                                <div key={o.id} className="p-6 bg-slate-900 text-white rounded-[2.5rem] shadow-2xl border-l-8 border-red-700 mb-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="bg-red-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">{o.diningType}</span>
                                        <span className="text-[10px] font-bold opacity-30">{o.timestamp}</span>
                                    </div>
                                    <div className="mb-6 space-y-2">
                                        {o.items.map((it, i) => (
                                            <div key={i} className="flex items-start gap-3">
                                                <span className="bg-red-700/20 text-red-500 px-2 py-0.5 rounded font-black text-sm">1x</span>
                                                <p className="text-xl font-bold uppercase tracking-tight">{it.name}</p>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => updateOrder(o.id, 'done')} className="w-full py-4 bg-green-600 rounded-2xl font-black text-xs uppercase tracking-widest">SETEL / SIAP</button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
