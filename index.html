<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauziah Tomyam - QR Ordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        // CONFIGURATION SECTION
        // If hosting on GitHub, replace the {} below with your Firebase Config from Firebase Console
        const manualConfig = {}; 
        
        const firebaseConfig = (window.__firebase_config) ? JSON.parse(window.__firebase_config) : manualConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fauziah-tomyam-system';
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        window.FauziahApp = {
            view: 'landing', 
            orderType: '', 
            tableNumber: '',
            cart: [],
            orders: [],
            user: null,

            menu: {
                "MINUMAN": [
                    { name: "Teh O", price: 1.50, options: ["Panas", "Sejuk"], prices: [1.50, 2.00] },
                    { name: "Teh", price: 2.00, options: ["Panas", "Sejuk"], prices: [2.00, 2.50] },
                    { name: "Milo", price: 2.50, options: ["Panas", "Sejuk"], prices: [2.50, 3.00] },
                    { name: "Nescafe", price: 2.50, options: ["Panas", "Sejuk"], prices: [2.50, 3.00] },
                    { name: "Sirap", price: 1.50, options: ["Sejuk"], prices: [2.00] }
                ],
                "NASI GORENG": [
                    { name: "Nasi Goreng Fauziah", price: 10.00 },
                    { name: "Nasi Goreng Special", price: 9.00 },
                    { name: "Nasi Goreng U.S.A", price: 9.00 },
                    { name: "Nasi Goreng Thailand", price: 9.00 },
                    { name: "Nasi Goreng Petai", price: 10.00 }
                ],
                "WESTERN": [
                    { name: "Chicken Chop", price: 14.00 },
                    { name: "Lamb Chop", price: 18.00 },
                    { name: "Beef Steak", price: 18.00 },
                    { name: "Fish & Chip", price: 11.00 }
                ],
                "MASAKAN": [
                    { name: "Nasi + Tomyam Ayam", price: 8.00 },
                    { name: "Nasi + Paprik Daging", price: 9.00 },
                    { name: "Nasi + Daging Merah", price: 9.00 }
                ]
            },

            async init() {
                const initAuth = async () => {
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                        await signInWithCustomToken(auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };

                onAuthStateChanged(auth, (user) => {
                    this.user = user;
                    if (user) { this.loadOrders(); }
                    this.render();
                });

                try { await initAuth(); } catch (err) { console.error("Auth failed", err); }
            },

            loadOrders() {
                if (!this.user) return;
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                onSnapshot(ordersRef, (snapshot) => {
                    this.orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.render();
                }, (err) => console.error("Firestore Listen Error:", err));
            },

            setView(newView) {
                this.view = newView;
                this.render();
                window.scrollTo(0,0);
            },

            scrollToCategory(catId) {
                const element = document.getElementById('cat-' + catId.replace(/\s+/g, '-'));
                if (element) {
                    const offset = 140; 
                    const elementPosition = element.getBoundingClientRect().top;
                    const offsetPosition = elementPosition + window.pageYOffset - offset;
                    window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                }
            },

            startOrder(type) {
                this.orderType = type;
                if (type === 'Dine In') {
                    const num = prompt("Enter Table Number:");
                    this.tableNumber = num || "N/A";
                }
                this.setView('menu');
            },

            addToCart(item, optionIndex = -1) {
                let price = item.price;
                let label = item.name;
                if (optionIndex !== -1 && item.options) {
                    price = item.prices[optionIndex];
                    label = `${item.name} (${item.options[optionIndex]})`;
                }
                this.cart.push({ displayTitle: label, selectedPrice: price, id: Date.now() + Math.random() });
                this.render();
                this.showToast(`Added ${label}`);
            },

            removeFromCart(index) {
                this.cart.splice(index, 1);
                this.render();
            },

            getCartTotal() {
                return this.cart.reduce((sum, item) => sum + item.selectedPrice, 0).toFixed(2);
            },

            async confirmOrder() {
                if (!this.user || this.cart.length === 0) return;
                const btn = document.getElementById('confirm-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<span class="animate-spin mr-2">⏳</span> SENDING...';
                }

                const orderData = {
                    items: [...this.cart],
                    total: this.getCartTotal(),
                    status: 'Pending', 
                    orderType: this.orderType,
                    table: this.tableNumber || 'Take Away',
                    timestamp: Date.now(),
                    userId: this.user.uid
                };

                try {
                    const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                    await addDoc(ordersRef, orderData);
                    this.cart = [];
                    this.setView('status');
                } catch (e) {
                    console.error("Error sending order:", e);
                    if (btn) {
                        btn.disabled = false;
                        btn.innerText = 'CONFIRM ORDER';
                    }
                }
            },

            async updateOrderStatus(orderId, newStatus) {
                if (!this.user) return;
                try {
                    const orderRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId);
                    await updateDoc(orderRef, { status: newStatus });
                } catch (e) { console.error("Update Error:", e); }
            },

            showToast(msg) {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.innerText = msg;
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);
            },

            render() {
                const appRoot = document.getElementById('app');
                if (!appRoot) return;
                
                let html = `
                    <div class="max-w-md mx-auto bg-gray-50 min-h-screen flex flex-col relative">
                        <header class="bg-red-700 text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-lg">
                            <div onclick="FauziahApp.setView('landing')" class="cursor-pointer">
                                <h1 class="text-xl font-black italic tracking-tighter">FAUZIAH <span class="text-yellow-400">TOMYAM</span></h1>
                            </div>
                            <button onclick="FauziahApp.setView('kitchen')" class="bg-white/20 p-2 rounded-lg"><i data-lucide="chef-hat" class="w-5 h-5"></i></button>
                        </header>
                        <main class="flex-1 pb-32">
                `;

                if (this.view === 'landing') {
                    html += `
                        <div class="p-8 text-center pt-20">
                            <div class="mb-12">
                                <div class="bg-red-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="qr-code" class="text-red-600 w-12 h-12"></i></div>
                                <h2 class="text-3xl font-black text-gray-900">ORDER NOW</h2>
                                <p class="text-gray-500 font-medium">Welcome to Student QR System</p>
                            </div>
                            <div class="space-y-4">
                                <button onclick="FauziahApp.startOrder('Dine In')" class="w-full bg-red-600 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 transition">DINE IN</button>
                                <button onclick="FauziahApp.startOrder('Take Away')" class="w-full bg-white border-2 border-red-600 text-red-600 font-black py-5 rounded-2xl flex items-center justify-center gap-3 transition">TAKE AWAY</button>
                            </div>
                        </div>
                    `;
                } else if (this.view === 'menu') {
                    html += `
                        <div class="sticky top-[64px] bg-white border-b z-40 p-3 overflow-x-auto no-scrollbar flex gap-2">
                            ${Object.keys(this.menu).map(cat => `
                                <button onclick="FauziahApp.scrollToCategory('${cat}')" class="whitespace-nowrap px-4 py-2 bg-gray-100 rounded-full text-xs font-black text-gray-700 uppercase">
                                    ${cat}
                                </button>
                            `).join('')}
                        </div>
                        <div class="p-4">
                            ${Object.entries(this.menu).map(([category, items]) => `
                                <div id="cat-${category.replace(/\s+/g, '-')}" class="mb-8 pt-4">
                                    <h3 class="text-lg font-black text-red-700 mb-4 border-l-4 border-red-700 pl-3 uppercase tracking-wider">${category}</h3>
                                    <div class="space-y-3">
                                        ${items.map(item => `
                                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                                <div class="flex-1">
                                                    <h4 class="font-bold text-gray-800 uppercase text-xs">${item.name}</h4>
                                                    <p class="text-red-600 font-black">RM ${item.price.toFixed(2)}</p>
                                                    ${item.options ? `
                                                        <div class="flex gap-2 mt-2">
                                                            ${item.options.map((opt, idx) => `
                                                                <button onclick="FauziahApp.addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')}, ${idx})" class="text-[10px] bg-gray-50 border px-2 py-1 rounded font-bold uppercase">${opt}</button>
                                                            `).join('')}
                                                        </div>
                                                    ` : ''}
                                                </div>
                                                ${!item.options ? `
                                                    <button onclick="FauziahApp.addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="bg-red-600 text-white p-2 rounded-xl shadow-md active:scale-90 transition-transform">
                                                        <i data-lucide="plus" class="w-5 h-5"></i>
                                                    </button>
                                                ` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                } else if (this.view === 'cart') {
                    html += `
                        <div class="p-6">
                            <h2 class="text-2xl font-black mb-6">Confirm Selection</h2>
                            <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-200 mb-6 text-xs font-bold text-yellow-800 uppercase text-center">
                                Paying at Counter: ${this.orderType} ${this.tableNumber && this.tableNumber !== 'N/A' ? `(Table ${this.tableNumber})` : ''}
                            </div>
                            ${this.cart.length === 0 ? `<div class="text-center py-20 text-gray-400 font-bold uppercase">Basket is empty</div>` : `
                                <div class="space-y-3 mb-8">
                                    ${this.cart.map((item, index) => `
                                        <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm border border-gray-100">
                                            <div><p class="font-bold text-gray-800 text-xs uppercase">${item.displayTitle}</p><p class="text-xs font-black text-red-600">RM ${item.selectedPrice.toFixed(2)}</p></div>
                                            <button onclick="FauziahApp.removeFromCart(${index})" class="text-gray-300"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="border-t-2 border-dashed pt-4 mb-6">
                                    <div class="flex justify-between items-center font-black text-xl"><span>TOTAL</span><span class="text-red-700">RM ${this.getCartTotal()}</span></div>
                                </div>
                                <button id="confirm-btn" onclick="FauziahApp.confirmOrder()" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl uppercase active:scale-95 transition">CONFIRM ORDER</button>
                            `}
                        </div>
                    `;
                } else if (this.view === 'status') {
                    const myOrders = this.orders.filter(o => o.userId === this.user?.uid).sort((a,b) => b.timestamp - a.timestamp);
                    html += `
                        <div class="p-6">
                            <h2 class="text-2xl font-black mb-6">ORDER STATUS</h2>
                            <div class="space-y-4">
                                ${myOrders.length === 0 ? '<p class="text-center py-10 text-gray-400 font-bold uppercase text-xs">No orders yet</p>' : ''}
                                ${myOrders.map(order => `
                                    <div class="bg-white p-5 rounded-3xl border-2 shadow-sm ${order.status === 'Ready' ? 'border-green-500' : 'border-gray-100'}">
                                        <div class="flex justify-between items-start mb-4">
                                            <span class="font-black text-red-700">#${order.id.slice(-4).toUpperCase()}</span>
                                            <span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-[10px] font-black uppercase">${order.status}</span>
                                        </div>
                                        <div class="text-[10px] font-bold text-gray-400 mb-4">${order.items.map(i => i.displayTitle).join(', ')}</div>
                                        <div class="bg-gray-50 p-3 rounded-xl text-center text-[10px] font-black uppercase text-gray-400">Pay RM ${order.total} at counter</div>
                                    </div>
                                `).join('')}
                            </div>
                            <button onclick="FauziahApp.setView('menu')" class="w-full mt-10 text-red-600 font-black uppercase text-xs text-center">Order More</button>
                        </div>
                    `;
                } else if (this.view === 'kitchen') {
                    const activeOrders = this.orders.filter(o => o.status !== 'Completed').sort((a,b) => a.timestamp - b.timestamp);
                    html += `
                        <div class="p-6 bg-gray-100 min-h-screen">
                            <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black text-red-700">KITCHEN OPS</h2><button onclick="FauziahApp.setView('landing')" class="text-xs font-black text-gray-400 uppercase">Exit</button></div>
                            <div class="space-y-4">
                                ${activeOrders.map(order => `
                                    <div class="bg-white p-6 rounded-3xl shadow-md">
                                        <div class="flex justify-between border-b pb-4 mb-4"><h3 class="font-black text-xl">#${order.id.slice(-4).toUpperCase()} (T: ${order.table})</h3><span class="text-xs font-black text-red-600 uppercase">RM ${order.total}</span></div>
                                        <div class="space-y-2 mb-6">${order.items.map(item => `<p class="font-bold text-gray-700 uppercase text-sm">1x ${item.displayTitle}</p>`).join('')}</div>
                                        <div class="flex gap-2">
                                            ${order.status === 'Pending' ? `<button onclick="FauziahApp.updateOrderStatus('${order.id}', 'Preparing')" class="flex-1 bg-black text-white py-3 rounded-2xl font-black text-xs uppercase">PREPARE</button>` 
                                            : order.status === 'Preparing' ? `<button onclick="FauziahApp.updateOrderStatus('${order.id}', 'Ready')" class="flex-1 bg-green-600 text-white py-3 rounded-2xl font-black text-xs uppercase">READY</button>` 
                                            : `<button onclick="FauziahApp.updateOrderStatus('${order.id}', 'Completed')" class="flex-1 bg-gray-200 text-gray-500 py-3 rounded-2xl font-black text-xs uppercase">COMPLETE</button>`}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }

                if (this.view !== 'landing' && this.view !== 'kitchen') {
                    html += `</main>
                        <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white border shadow-2xl rounded-3xl py-4 flex justify-around z-50">
                            <button onclick="FauziahApp.setView('menu')" class="flex flex-col items-center ${this.view === 'menu' ? 'text-red-600' : 'text-gray-300'}"><i data-lucide="book-open" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Menu</span></button>
                            <button onclick="FauziahApp.setView('cart')" class="relative flex flex-col items-center ${this.view === 'cart' ? 'text-red-600' : 'text-gray-300'}"><i data-lucide="shopping-basket" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Basket</span>${this.cart.length > 0 ? `<span class="absolute -top-2 -right-2 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">${this.cart.length}</span>` : ''}</button>
                            <button onclick="FauziahApp.setView('status')" class="flex flex-col items-center ${this.view === 'status' ? 'text-red-600' : 'text-gray-300'}"><i data-lucide="clock" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Status</span></button>
                        </nav>`;
                } else { html += `</main>`; }
                html += `</div>`;
                appRoot.innerHTML = html; lucide.createIcons();
            }
        };
        window.onload = () => FauziahApp.init();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100"><div id="app"></div><div id="toast" class="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full text-xs font-black uppercase z-[100]"></div></body>
</html>
